[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ffi = true

[invariant]
runs = 1000
depth = 32
fail_on_revert = true

[fuzz]
runs = 1000
seed = "0x1"

[profile.halmos]
src = "src"
test = "test"


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
